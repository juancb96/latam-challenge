name: 'Continuous Delivery'

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image via Cloud Build
        run: |
          BUILD_ID=$(gcloud builds submit \
            --tag ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/${{ vars.IMAGE_NAME }}:${{ github.sha }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --async \
            --format='value(id)')
          echo "Build submitted: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project ${{ vars.GCP_PROJECT_ID }} \
              --format='value(status)')
            echo "Status: $STATUS"
            case $STATUS in
              SUCCESS) echo "Build succeeded"; break ;;
              FAILURE|CANCELLED|TIMEOUT|EXPIRED)
                echo "Build failed with status: $STATUS"; exit 1 ;;
              *) sleep 15 ;;
            esac
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.CLOUD_RUN_SERVICE }} \
            --image ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/${{ vars.IMAGE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ vars.GCP_REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 1 \
            --concurrency 80 \
            --set-env-vars API_KEY=${{ secrets.API_KEY }} \
            --project ${{ vars.GCP_PROJECT_ID }}
